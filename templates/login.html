{% extends 'base.html' %}

{% block title %}Login - FoodBridge{% endblock %}

{% block content %}
<div class="auth-section">
    <div class="card auth-card-premium card-accent-top" style="max-width: 480px;">
        <div style="text-align: center; margin-bottom: 40px;">
            <div class="icon-box" style="margin: 0 auto 20px;">
                <i class="fas fa-lock"></i>
            </div>
            <h1 class="fw-bold" style="font-size: 2rem; color: var(--primary);">Welcome Back</h1>
            <p class="text-muted">Login to continue your mission.</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <div class="input-group">
                    <input type="email" id="loginEmail" class="form-control" required placeholder="name@example.com">
                    <i class="fas fa-envelope"></i>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <input type="password" id="loginPassword" class="form-control" required placeholder="••••••••">
                    <i class="fas fa-key"></i>
                </div>
            </div>

            <div class="d-flex justify-between align-center mb-5">
                <label class="d-flex align-center gap-1 small fw-bold" style="cursor: pointer; opacity: 0.8;">
                    <input type="checkbox" id="remember" style="accent-color: var(--primary);"> Remember me
                </label>
                <a href="#" onclick="forgotPassword()" class="small text-primary fw-bold">Forgot Password?</a>
            </div>

            <button type="submit" id="loginBtn" class="btn btn-primary btn-block" style="padding: 16px;">
                Sign In
            </button>

            <div class="hr-text"><span>OR</span></div>

            <button type="button" id="googleLoginBtn" class="btn btn-google btn-block">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" style="margin-right: 12px;">
                Continue with Google
            </button>
        </form>

        <div style="text-align: center; margin-top: 40px; padding-top: 25px; border-top: 1px solid var(--border);">
            <p class="small text-muted">Don't have an account? <a href="{{ url_for('auth.register') }}" class="text-primary fw-bold">Create one now</a></p>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script type="module">
    import { signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

    const loginBtn = document.getElementById('loginBtn');

    async function handleLogin(idToken) {
        try {
            const response = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ idToken })
            });
            const result = await response.json();
            if (result.success) {
                window.location.href = "{{ url_for('index') }}";
            } else {
                alert("Login failed: " + result.error);
                if (result.error.includes("register")) {
                    window.location.href = "{{ url_for('auth.register') }}";
                }
            }
        } catch (error) {
            alert("Network Error: " + error.message);
        }
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;

        try {
            loginBtn.disabled = true;
            loginBtn.innerText = "Verifying...";
            const userCredential = await signInWithEmailAndPassword(window.auth, email, password);
            const idToken = await userCredential.user.getIdToken();
            await handleLogin(idToken);
        } catch (error) {
            alert("Authentication Error: " + error.message);
            loginBtn.disabled = false;
            loginBtn.innerText = "Sign In";
        }
    });

    document.getElementById('googleLoginBtn').addEventListener('click', async () => {
        const provider = new GoogleAuthProvider();
        try {
            const result = await signInWithPopup(window.auth, provider);
            const idToken = await result.user.getIdToken();
            await handleLogin(idToken);
        } catch (error) {
            alert("Google Auth Error: " + error.message);
        }
    });

    window.forgotPassword = async () => {
        const emailInput = document.getElementById('loginEmail');
        const email = emailInput.value.trim();

        if (!email) {
            alert("Please enter your email address first.");
            emailInput.focus();
            return;
        }

        try {
            await sendPasswordResetEmail(window.auth, email);
            alert("A password reset link has been sent to your email.");
        } catch (error) {
            alert("Error: " + error.message);
        }
    };
</script>
{% endblock %}
